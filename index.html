<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NovaFlux</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,"SF Pro Display",sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#050912,#111827);
}

.calc{
width:370px;
padding:16px;
border-radius:32px;
background:#0f172a;
box-shadow:0 20px 50px rgba(0,0,0,.55);
}

.brand{
text-align:center;
margin-bottom:8px;
}

.brand h2{
color:#dbeafe;
font-size:24px;
}

.creator{
display:inline-block;
margin-top:5px;
padding:5px 12px;
border-radius:16px;
font-size:12px;
font-weight:700;
color:#67e8f9;
background:rgba(103,232,249,.12);
box-shadow:0 0 10px rgba(103,232,249,.18);
}

.toggleSci{
width:100%;
height:38px;
border:none;
border-radius:14px;
background:#1e293b;
color:#cbd5e1;
font-size:16px;
margin-bottom:8px;
}

#sciWrap{
max-height:0;
overflow:hidden;
transition:.35s ease;
}

#sciPanel{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
padding-bottom:8px;
}

.sci{
height:44px;
font-size:16px;
border-radius:14px;
background:#475569;
}

.display{
height:82px;
display:flex;
justify-content:flex-end;
align-items:flex-end;
font-size:48px;
color:white;
padding:8px;
overflow:auto;
}

.keys{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

button{
height:62px;
border:none;
border-radius:22px;
font-size:22px;
color:white;
background:#374151;
}

button:active{
transform:scale(.95);
}

.num{background:#2f3640;}
.op{background:#475569;}
.ac{background:#0059b3;}
.eq{background:#d8b4e2;color:#111;}
</style>
</head>
<body>

<div class="calc">

<div class="brand">
<h2>NovaFlux</h2>
<div class="creator">by prince saroj ✦</div>
</div>

<button class="toggleSci" onclick="toggleSci()">
⌃ Scientific Tools
</button>

<div id="sciWrap">
<div id="sciPanel">
<button class="sci" onclick="root()">√</button>
<button class="sci" onclick="add('Math.PI','π')">π</button>
<button class="sci" onclick="add('**','^')">^</button>
<button class="sci" onclick="factorial()">!</button>

<button class="sci" onclick="func('sin')">sin</button>
<button class="sci" onclick="func('cos')">cos</button>
<button class="sci" onclick="func('tan')">tan</button>
<button class="sci" onclick="add('Math.E','e')">e</button>

<button class="sci" onclick="func('ln')">ln</button>
<button class="sci" onclick="func('log')">log</button>
<button class="sci" onclick="add('(','(')">(</button>
<button class="sci" onclick="add(')',')')">)</button>
</div>
</div>

<div class="display" id="screen">0</div>

<div class="keys">
<button class="ac" onclick="clearAll()">AC</button>
<button class="op" onclick="add('%','%')">%</button>
<button class="op" onclick="add('/','÷')">÷</button>
<button class="op" onclick="del()">⌫</button>

<button class="num" onclick="add('7','7')">7</button>
<button class="num" onclick="add('8','8')">8</button>
<button class="num" onclick="add('9','9')">9</button>
<button class="op" onclick="add('*','×')">×</button>

<button class="num" onclick="add('4','4')">4</button>
<button class="num" onclick="add('5','5')">5</button>
<button class="num" onclick="add('6','6')">6</button>
<button class="op" onclick="add('-','−')">−</button>

<button class="num" onclick="add('1','1')">1</button>
<button class="num" onclick="add('2','2')">2</button>
<button class="num" onclick="add('3','3')">3</button>
<button class="op" onclick="add('+','+')">+</button>

<button class="num" onclick="add('0','0')">0</button>
<button class="num" onclick="add('.','.')">.</button>
<button class="num" onclick="toggleSign()">±</button>
<button class="eq" onclick="calculate()">=</button>
</div>

</div>

<script>
let realExp="";
let showExp="";
let screen=document.getElementById("screen");

const ctx=new(window.AudioContext||window.webkitAudioContext)();

function feedback(){

if(ctx.state==="suspended"){
ctx.resume();
}

if(navigator.vibrate){
navigator.vibrate([18,8,18]);
}

let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.type="triangle";
osc.frequency.value=170;
gain.gain.value=0.04;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
},30);

}

function update(){
screen.innerText=showExp||"0";
}

function add(r,s){
feedback();
realExp+=r;
showExp+=s;
update();
}

function clearAll(){
feedback();
realExp="";
showExp="";
update();
}

function del(){
feedback();
realExp=realExp.slice(0,-1);
showExp=showExp.slice(0,-1);
update();
}

function toggleSign(){
feedback();

if(realExp.startsWith("-")){
realExp=realExp.slice(1);
showExp=showExp.slice(1);
}else{
realExp="-"+realExp;
showExp="-"+showExp;
}
update();
}

function calculate(){
feedback();

try{
let r=eval(realExp);

realExp=r.toString();
showExp=r.toString();

update();
}catch{}
}

function root(){
feedback();

let r=Math.sqrt(eval(realExp));

realExp=r.toString();
showExp=r.toString();

update();
}

function factorial(){
feedback();

let n=parseInt(eval(realExp));
let f=1;

for(let i=1;i<=n;i++){
f*=i;
}

realExp=f.toString();
showExp=f.toString();

update();
}

function func(t){
feedback();

if(t=="sin"){
add("Math.sin(","sin(");
}

if(t=="cos"){
add("Math.cos(","cos(");
}

if(t=="tan"){
add("Math.tan(","tan(");
}

if(t=="ln"){
add("Math.log(","ln(");
}

if(t=="log"){
add("Math.log10(","log(");
}
}

function toggleSci(){
feedback();

let box=document.getElementById("sciWrap");

if(box.style.maxHeight=="0px" || !box.style.maxHeight){
box.style.maxHeight="190px";
}else{
box.style.maxHeight="0px";
}
}
</script>

</body>
  </html>
